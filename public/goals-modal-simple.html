<!-- ─── Simplified Goals Modal ────────────────────────────────────────── -->
<div id="goals-modal" class="mood-modal">
    <div class="mood-modal-overlay" onclick="closeGoalsModal()"></div>
    <div class="mood-modal-sheet">
        <div class="modal-header">
            <button type="button" class="modal-back-btn" onclick="closeGoalsModal()">
                <i class="bi bi-chevron-left"></i>
            </button>
            <h2 class="sheet-title">Goals</h2>
            <button type="button" class="modal-save-btn" id="goals-add-btn" onclick="showGoalForm()">
                <i class="bi bi-plus-lg"></i>
            </button>
        </div>

        <div class="modal-content">
            <!-- Goals List View -->
            <div id="goals-list-view">
                <div class="goals-filter-tabs">
                    <button class="goals-filter-tab active" data-filter="personal" onclick="filterGoals('personal')">
                        <i class="bi bi-person"></i> Personal
                    </button>
                    <button class="goals-filter-tab" data-filter="team" onclick="filterGoals('team')">
                        <i class="bi bi-people"></i> Team
                    </button>
                </div>

                <div id="goals-list-container" class="goals-list-container">
                    <!-- Goals will be populated here -->
                </div>
            </div>

            <!-- Goal Form View (hidden by default) -->
            <div id="goal-form-view" style="display: none;">
                <div class="form-group">
                    <label class="form-label">Goal Title</label>
                    <input type="text" id="goal-title" class="form-input" placeholder="Enter goal title" maxlength="100">
                </div>

                <div class="form-group">
                    <label class="form-label">Description (Optional)</label>
                    <textarea id="goal-description" class="note-input" placeholder="Add details..." maxlength="300" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Type</label>
                    <select id="goal-type" class="form-input">
                        <option value="personal">👤 Personal</option>
                        <option value="team">👥 Team</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <input type="checkbox" id="goal-notifications-enabled" checked style="margin-right: 8px;">
                        Enable Daily Reminders
                    </label>
                </div>

                <div class="form-group" id="notification-time-group">
                    <label class="form-label">Reminder Time</label>
                    <input type="time" id="goal-notification-time" class="form-input" value="09:00">
                </div>

                <div class="mood-actions-row">
                    <button type="button" class="btn-secondary" onclick="showGoalsList()">Cancel</button>
                    <button type="button" class="btn-primary" onclick="saveGoal()">Save Goal</button>
                </div>
            </div>
        </div>
    </div>
</div>
