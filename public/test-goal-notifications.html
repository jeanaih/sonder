<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goal Notifications Test</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 { 
            text-align: center; 
            color: var(--primary); 
            margin-bottom: 1.5rem; 
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        ul { list-style: none; padding: 0; }
        li {
            background: #f1f5f9;
            margin-bottom: 8px;
            padding: 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            border-left: 4px solid #cbd5e1;
        }
        li.notified {
            border-left: 4px solid #22c55e;
            opacity: 0.7;
        }
        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .status {
            background: #fef3c7;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎯 Goal Notifications Test</h2>
        
        <div class="status" id="status">
            Permission: <strong id="permStatus">Checking...</strong><br>
            Engine: <strong id="engineStatus">Stopped</strong>
        </div>

        <div class="form-group">
            <input type="text" id="goalInput" placeholder="Anong goal mo? (e.g. Mag-aral ng JS)">
            <input type="datetime-local" id="timeInput">
            <button onclick="addGoal()">Set Reminder</button>
        </div>

        <hr>
        <h3>Active Goals</h3>
        <ul id="goalList"></ul>
    </div>

    <script>
        // Register Service Worker FIRST
        let swRegistration = null;

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => {
                    console.log('✅ Service Worker registered');
                    swRegistration = reg;
                    
                    // Request permission after SW is ready
                    return Notification.requestPermission();
                })
                .then(permission => {
                    console.log('Permission:', permission);
                    updateStatus();
                })
                .catch(err => {
                    console.error('❌ Service Worker error:', err);
                });
        }

        updateStatus();

        // 2. Load goals from LocalStorage
        let goals = JSON.parse(localStorage.getItem('testGoals')) || [];
        renderGoals();

        function updateStatus() {
            const perm = Notification.permission;
            document.getElementById('permStatus').textContent = perm;
            document.getElementById('permStatus').style.color = 
                perm === 'granted' ? '#22c55e' : '#ef4444';
        }

        function addGoal() {
            const task = document.getElementById('goalInput').value;
            const timeValue = document.getElementById('timeInput').value;

            if (!task || !timeValue) {
                alert("Paki-lagay ang goal at ang oras!");
                return;
            }

            const newGoal = {
                id: Date.now(),
                task: task,
                time: new Date(timeValue).getTime(),
                notified: false
            };

            goals.push(newGoal);
            saveAndRender();

            // Clear inputs
            document.getElementById('goalInput').value = "";
            document.getElementById('timeInput').value = "";

            console.log('✅ Goal added:', newGoal);
        }

        function deleteGoal(id) {
            goals = goals.filter(g => g.id !== id);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('testGoals', JSON.stringify(goals));
            renderGoals();
        }

        function renderGoals() {
            const list = document.getElementById('goalList');
            list.innerHTML = "";

            // I-sort ang goals base sa oras (pinaka-maaga muna)
            goals.sort((a, b) => a.time - b.time);

            goals.forEach(goal => {
                const isDone = goal.notified ? 'notified' : '';
                const li = document.createElement('li');
                li.className = isDone;
                
                const now = Date.now();
                const timeLeft = goal.time - now;
                const secondsLeft = Math.floor(timeLeft / 1000);
                const countdown = secondsLeft > 0 ? ` (in ${secondsLeft}s)` : ' (PAST)';
                
                li.innerHTML = `
                    <div>
                        <strong>${goal.task}</strong><br>
                        <small>${new Date(goal.time).toLocaleString()}${countdown}</small>
                    </div>
                    <button class="delete-btn" onclick="deleteGoal(${goal.id})">Delete</button>
                `;
                list.appendChild(li);
            });
        }

        // 3. REAL-TIME ENGINE: Chine-check ang list bawat segundo
        setInterval(() => {
            const now = Date.now();
            let hasChanges = false;

            goals.forEach(goal => {
                // Kung dumating na ang oras at hindi pa nina-notify
                if (now >= goal.time && !goal.notified) {
                    console.log('🔔 Time reached for:', goal.task);
                    triggerAlert(goal.task);
                    goal.notified = true;
                    hasChanges = true;
                }
            });

            if (hasChanges) {
                saveAndRender();
            }
            
            // Update countdown display
            renderGoals();
            
            document.getElementById('engineStatus').textContent = 'Running ✅';
            document.getElementById('engineStatus').style.color = '#22c55e';
        }, 1000);

        function triggerAlert(task) {
            console.log('🔔 Firing notification for:', task);
            
            // IN-APP NOTIFICATION - Always works!
            showInAppNotification(task);
            
            // Try Windows notification (pero blocked sa system mo)
            if (swRegistration && Notification.permission === "granted") {
                swRegistration.active.postMessage({
                    type: 'SHOW_NOTIFICATION',
                    title: '🎯 Goal Reminder',
                    body: `Hoy! Oras na para sa: ${task}`,
                    tag: `goal-${Date.now()}`
                });
            }
        }
        
        function showInAppNotification(task) {
            // Create modal overlay
            const overlay = document.createElement('div');
            overlay.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.8);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 9999;
                animation: fadeIn 0.3s;
            `;
            
            const modal = document.createElement('div');
            modal.style.cssText = `
                background: white;
                padding: 30px;
                border-radius: 12px;
                max-width: 400px;
                text-align: center;
                box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                animation: slideUp 0.3s;
            `;
            
            modal.innerHTML = `
                <div style="font-size: 60px; margin-bottom: 20px;">🎯</div>
                <h2 style="margin: 0 0 10px 0; color: #1e293b;">Goal Reminder!</h2>
                <p style="font-size: 18px; color: #64748b; margin: 0 0 20px 0;">
                    Hoy! Oras na para sa:
                </p>
                <p style="font-size: 20px; font-weight: bold; color: #6366f1; margin: 0 0 30px 0;">
                    ${task}
                </p>
                <button onclick="this.closest('div').parentElement.remove()" style="
                    background: #6366f1;
                    color: white;
                    border: none;
                    padding: 12px 30px;
                    border-radius: 6px;
                    font-size: 16px;
                    cursor: pointer;
                    font-weight: bold;
                ">Got it!</button>
            `;
            
            overlay.appendChild(modal);
            document.body.appendChild(overlay);
            
            // Play sound
            const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIGGS57OihUBELTKXh8bllHAU2jdXvzn0pBSh+zPDajzsKElyx6OyrWBUIQ5zd8sFuJAUuhM/z24k2CBhku+zooVARC0yl4fG5ZRwFNo3V7859KQUofsz');
            audio.play().catch(() => {});
            
            // Auto-close after 10 seconds
            setTimeout(() => {
                if (overlay.parentElement) {
                    overlay.remove();
                }
            }, 10000);
            
            console.log('✅ In-app notification shown');
        }
    </script>
    
    <style>
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</body>
</html>
